; =============================================================================
; 99-custom.ini — Configurações PHP personalizadas para Moodle (dev local)
;
; Este arquivo é copiado automaticamente por install-php.sh para:
;   /etc/php/<versão>/fpm/conf.d/99-custom.ini
;   /etc/php/<versão>/cli/conf.d/99-custom.ini
;
; Compatível com PHP 7.4, 8.0, 8.1, 8.2, 8.3.
;
; ⚠  ATENÇÃO: configurações voltadas para DESENVOLVIMENTO LOCAL.
;    display_errors = On e error_reporting = E_ALL expõem erros ao
;    navegador — NÃO utilize estas configurações em produção.
; =============================================================================

; --- Limites de Recursos ---
memory_limit         = 512M
max_execution_time   = 300
upload_max_filesize  = 100M
post_max_size        = 100M
max_input_vars       = 5000

; --- Otimização OPcache ---
; Vital para a velocidade do Moodle. Ajuste opcache.memory_consumption
; conforme a quantidade de instâncias Moodle em uso simultâneo.
opcache.enable                  = 1
opcache.memory_consumption      = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 20000
opcache.revalidate_freq         = 2
; Nota: opcache.fast_shutdown removido — deprecado desde PHP 7.2

; --- Tratamento de Erros (SOMENTE DEV) ---
; ⚠  Remova ou desative estas linhas em ambiente de produção
display_errors         = On
display_startup_errors = On
error_reporting        = E_ALL

; --- Localização ---
date.timezone = America/Sao_Paulo

; --- Segurança e Compatibilidade ---
; cgi.fix_pathinfo = 1 é necessário para roteamento do Moodle via PHP-FPM
cgi.fix_pathinfo = 1
